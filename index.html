<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marweb | Menu Motivasi + Musik</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1200&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
            backdrop-filter: blur(2px);
        }

        .container {
            max-width: 580px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 32px;
            position: relative;
        }

        .header-img-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 50%;
        }

        /* ===== GELOMBANG LEBIH HALUS ===== */
        .header-img-wrapper .wave-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            animation: waveExpand 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
            opacity: 0;
            z-index: 1;
            will-change: transform, opacity;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.02);
        }
        .header-img-wrapper .wave-ring:nth-child(1) { animation-delay: 0s; }
        .header-img-wrapper .wave-ring:nth-child(2) { animation-delay: 1.33s; }
        .header-img-wrapper .wave-ring:nth-child(3) { animation-delay: 2.66s; }

        @keyframes waveExpand {
            0% {
                transform: scale(1);
                opacity: 0.6;
                border-width: 2.5px;
                border-color: rgba(255, 255, 255, 0.5);
            }
            30% {
                opacity: 0.8;
                border-color: rgba(255, 255, 255, 0.3);
            }
            100% {
                transform: scale(1.55);
                opacity: 0;
                border-width: 0.5px;
                border-color: rgba(255, 255, 255, 0);
            }
        }

        .header-img-wrapper .glow-bg {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.06), transparent 70%);
            animation: pulseGlow 3.5s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.2; transform: scale(0.92); }
            100% { opacity: 0.7; transform: scale(1.08); }
        }

        .header-img-wrapper img {
            display: block;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
            z-index: 2;
            border: 2.5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 222, 238, 0.05);
            transition: 0.4s ease;
        }
        .header-img-wrapper img:hover {
            transform: scale(1.05) rotate(-3deg);
            border-color: rgba(0, 222, 238, 0.3);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-top: 12px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
        }
        .header h1 .mar {
            color: #ffffff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }
        .header h1 .web {
            color: #ff3b3b;
            text-shadow: 0 0 30px rgba(255, 59, 59, 0.2);
        }

        .header .sub {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin-top: 4px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ===== MENU ===== */
        .menu-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 13px 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.34, 1.0, 0.64, 1);
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            flex-wrap: nowrap;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
        }

        .menu-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 222, 238, 0.03), rgba(123, 97, 255, 0.03));
            opacity: 0;
            transition: 0.4s ease;
        }

        .menu-item:hover::before {
            opacity: 1;
        }

        .menu-item:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.12);
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.09);
            transform: translateY(-3px) scale(1.005);
            border-color: rgba(0, 222, 238, 0.2);
            box-shadow: 0 8px 35px rgba(0, 0, 0, 0.3), 0 0 40px rgba(0, 222, 238, 0.03);
        }

        .number-circle {
            min-width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.7rem;
            margin-right: 14px;
            flex-shrink: 0;
            background: rgba(0, 222, 238, 0.12);
            color: #00deee;
            border: 1px solid rgba(0, 222, 238, 0.15);
            transition: 0.4s ease;
            pointer-events: none;
        }

        .menu-item:hover .number-circle {
            background: #00deee;
            color: #0a0a0a;
            border-color: #00deee;
            box-shadow: 0 0 25px rgba(0, 222, 238, 0.2);
            transform: scale(1.05);
        }

        .info {
            pointer-events: none;
            flex: 1;
            min-width: 0;
        }
        .info h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 1px;
            letter-spacing: 0.1px;
            white-space: nowrap;
            transition: 0.3s;
        }
        .menu-item:hover .info h3 {
            color: #fff;
        }
        .info p {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.45);
            line-height: 1.3;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
            transition: 0.3s;
        }
        .menu-item:hover .info p {
            color: rgba(255, 255, 255, 0.6);
        }
        .info a {
            pointer-events: auto;
            text-decoration: none;
            color: inherit;
            display: inline-block;
        }
        .info a:hover p {
            color: #ffffff;
        }

        .menu-arrow {
            pointer-events: none;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.75rem;
            transition: 0.4s ease;
            margin-left: 8px;
            flex-shrink: 0;
        }
        .menu-item:hover .menu-arrow {
            color: #00deee;
            transform: translateX(4px);
        }

        /* Animasi muncul menu — lebih smooth */
        .menu-item {
            opacity: 0;
            animation: fadeInUp 0.5s cubic-bezier(0.34, 1.0, 0.64, 1) forwards;
        }
        .menu-item:nth-child(2) { animation-delay: 0.06s; }
        .menu-item:nth-child(3) { animation-delay: 0.12s; }
        .menu-item:nth-child(4) { animation-delay: 0.18s; }
        .menu-item:nth-child(5) { animation-delay: 0.24s; }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(12px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-bubble {
            background: rgba(18, 20, 38, 0.98);
            border-radius: 28px;
            max-width: 420px;
            width: 100%;
            padding: 32px 28px 26px;
            position: relative;
            transform: scale(0.85) translateY(30px) rotate(-2deg);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.02);
        }

        .modal-overlay.active .modal-bubble {
            transform: scale(1) translateY(0) rotate(0deg);
        }

        .modal-close-btn {
            position: absolute;
            top: 14px;
            right: 16px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.0, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            backdrop-filter: blur(4px);
        }

        .modal-close-btn:hover {
            background: rgba(255, 70, 70, 0.15);
            color: #ff6b6b;
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 30px rgba(255, 70, 70, 0.1);
        }

        .modal-close-btn:active {
            transform: rotate(90deg) scale(0.9);
        }

        .modal-close-btn svg {
            width: 22px;
            height: 22px;
            stroke-width: 2.5px;
        }

        .modal-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 28px;
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 14px solid rgba(18, 20, 38, 0.98);
        }

        .modal-bubble .modal-icon {
            font-size: 2.4rem;
            display: block;
            margin-bottom: 4px;
            animation: waveHand 2s ease-in-out infinite;
        }

        @keyframes waveHand {
            0%, 100% { transform: rotate(0deg); }
            20% { transform: rotate(15deg); }
            40% { transform: rotate(-10deg); }
            60% { transform: rotate(12deg); }
            80% { transform: rotate(-5deg); }
        }

        .modal-bubble h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .modal-bubble .modal-msg {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 0;
        }

        .modal-bubble .modal-msg .heart {
            color: #ff6b8a;
            display: inline-block;
            animation: heartbeat 1.2s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.25); }
            28% { transform: scale(1); }
            42% { transform: scale(1.25); }
            70% { transform: scale(1); }
        }

        /* ===== TOAST — SUPER TRANSPARAN, ALA WA ===== */
        .toast-container {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 440px;
            pointer-events: none;
        }

        .toast {
            background: rgba(8, 10, 24, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px 22px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.92);
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: auto;
            cursor: default;
            position: relative;
            max-height: 60vh;
            overflow-y: auto;
            letter-spacing: 0.2px;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            animation: floatToast 3.5s ease-in-out infinite alternate;
        }

        @keyframes floatToast {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(-5px) scale(1.008); }
        }

        .toast::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 22px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 10px solid rgba(8, 10, 24, 0.12);
            filter: blur(0.5px);
        }

        .toast .heart {
            color: #ff6b8a;
            display: inline-block;
            animation: heartbeat 1.2s infinite;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            body { padding: 16px; }
            .header-img-wrapper img { width: 66px; height: 66px; }
            .header h1 { font-size: 1.7rem; }
            .header .sub { font-size: 0.7rem; }
            .menu-item { padding: 11px 14px; margin-bottom: 10px; border-radius: 14px; }
            .number-circle { min-width: 32px; height: 32px; font-size: 0.65rem; margin-right: 12px; }
            .info h3 { font-size: 0.85rem; }
            .info p { font-size: 0.65rem; max-width: 120px; }
            .modal-bubble { padding: 24px 20px 20px; }
            .modal-bubble h2 { font-size: 1.1rem; }
            .modal-bubble .modal-msg { font-size: 0.82rem; }
            .modal-close-btn { width: 38px; height: 38px; top: 12px; right: 14px; }
            .modal-close-btn svg { width: 18px; height: 18px; }
            .toast { font-size: 0.78rem; padding: 14px 18px; border-radius: 18px; }
            .toast::before { left: 18px; }
            .container { max-width: 100%; }
        }

        @media (max-width: 400px) {
            .header-img-wrapper img { width: 56px; height: 56px; }
            .header h1 { font-size: 1.4rem; }
            .header .sub { font-size: 0.6rem; letter-spacing: 1.5px; }
            .menu-item { padding: 9px 12px; }
            .number-circle { min-width: 28px; height: 28px; font-size: 0.55rem; margin-right: 10px; }
            .info h3 { font-size: 0.75rem; }
            .info p { font-size: 0.55rem; max-width: 80px; }
            .modal-bubble { padding: 20px 16px 16px; }
            .modal-bubble h2 { font-size: 1rem; }
            .modal-bubble .modal-msg { font-size: 0.75rem; }
            .modal-close-btn { width: 34px; height: 34px; top: 10px; right: 12px; }
            .modal-close-btn svg { width: 16px; height: 16px; }
            .toast { font-size: 0.7rem; padding: 12px 14px; border-radius: 16px; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== HEADER ===== -->
        <div class="header">

                <span class="wave-ring"></span>

                <h3>Komunitas Art</h3>
                <a href="#" target="_blank"><p>Gabung komunitas seni</p></a>
            </div>
            <div class="menu-arrow">→</div>
        </div>

        <div class="menu-item" data-index="3">
            <div class="number-circle">04</div>
            <div class="info">
                <h3>Komunitas Design</h3>
                <a href="#" target="_blank"><p>Kolaborasi desainer</p></a>
            </div>
            <div class="menu-arrow">→</div>
        </div>

        

        <!-- ===== AUDIO ===== -->
        <audio id="bgMusic1" loop preload="auto" style="display:none;">
            <source src="Journey(chosic.com).mp3" type="audio/mpeg" />
        </audio>
        <audio id="bgMusic2" preload="auto" style="display:none;">
            <source src="WhatsApp Ptt 2026-07-19 at 16.42.31.ogg" type="audio/ogg" />
            <source src="WhatsApp Ptt 2026-07-19 at 16.42.31.ogg" type="audio/mpeg" />

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-bubble" id="modalBubble">
            <button class="modal-close-btn" id="modalCloseBtn" aria-label="Tutup">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round">

    <!-- ===== TOAST ===== -->
    <div class="toast-container" id="toastContainer">
        <div class="toast" id="toast"></div>
    </div>

    <!-- ===== SCRIPT ===== -->
    <script>
        (function() {
            // Pesan tetap untuk menu 1-4
            const menuMessages = [
                "Berhenti membandingkan perjalananmu dengan orang lain. Fokus saja pada versi terbaik dirimu sendiri hari ini. 🌟",
                "halo semuanya, terimakasih banyak telah mengunjungi website ini, saya sangat menghargai dan mencintainya. ❤️",
                "semoga dilancarkan segala urusan kalian yah tetap semangat semuanya.. sekali lagi terimakasih banyak 🙏",
                "Jangan pernah menyerah, mimpi besar butuh perjuangan besar! 💪"
            ];

            const menuItems = document.querySelectorAll('.menu-item');
            const toast = document.getElementById('toast');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalCloseBtn = document.getElementById('modalCloseBtn');
            const audio1 = document.getElementById('bgMusic1');
            const audio2 = document.getElementById('bgMusic2');

            let timeoutId = null;
            let musicStarted = false;
            let isModalOpen = false;

            // ---- MUSIK ----
            function startBothMusics() {
                if (musicStarted) return;
                if (!audio1 || !audio2) return;
                audio1.volume = 0.2;
                audio2.volume = 0.2;
                const p1 = audio1.play();
                const p2 = audio2.play();
                Promise.allSettled([p1, p2]).then(() => {
                    musicStarted = true;
                }).catch(() => {});
            }

            function handleFirstInteraction() {
                startBothMusics();
                document.removeEventListener('click', handleFirstInteraction);
                document.removeEventListener('touchstart', handleFirstInteraction);
                document.removeEventListener('keydown', handleFirstInteraction);
            }
            document.addEventListener('click', handleFirstInteraction);
            document.addEventListener('touchstart', handleFirstInteraction);
            document.addEventListener('keydown', handleFirstInteraction);

            // ---- TOAST ----
            function showToast(message, duration = 5800) {
                toast.innerHTML = message;
                toast.classList.remove('show');
                void toast.offsetWidth;
                toast.classList.add('show');
                if (timeoutId) {
                    clearTimeout(timeoutId);
                    timeoutId = null;
                }
                timeoutId = setTimeout(() => {
                    toast.classList.remove('show');
                    timeoutId = null;
                }, duration);
            }

            // ---- MODAL ----
            function openModal() {
                modalOverlay.classList.add('active');
                isModalOpen = true;
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                modalOverlay.classList.remove('active');
                isModalOpen = false;
                document.body.style.overflow = '';
                setTimeout(() => {
                    showToast('👋 Selamat datang di Marweb! Klik menu untuk motivasi.', 3500);
                }, 350);
            }

            modalCloseBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                closeModal();
            });

            modalOverlay.addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && isModalOpen) closeModal();
            });

            // ---- KLIK MENU ----
            menuItems.forEach((item, index) => {
                item.addEventListener('click', function(e) {
                    if (e.target.closest('a')) return;
                    if (isModalOpen) return;

                    const noToast = this.dataset.noToast === 'true';
                    if (!noToast) {
                        const msg = menuMessages[index] || "Teruslah berjuang, kamu hebat! 💪";
                        showToast(msg, 6200);
                    } else {
                        if (timeoutId) {
                            clearTimeout(timeoutId);
                            timeoutId = null;
                        }
                        toast.classList.remove('show');
                    }

                    if (navigator.vibrate) navigator.vibrate(10);
                    startBothMusics();
                });
            });

            // ---- KLIK TOAST = HILANG ----
            toast.addEventListener('click', function() {
                this.classList.remove('show');
                if (timeoutId) {
                    clearTimeout(timeoutId);
                    timeoutId = null;
                }
            });

            // ---- BUKA MODAL SAAT LOAD ----
            window.addEventListener('load', function() {
                setTimeout(openModal, 700);
            });

            console.log('✅ Marweb — gelombang lebih halus dengan durasi 4 detik');
            console.log('🎵 Musik diputar setelah interaksi');
            console.log('💬 Toast super transparan ala WA');
            console.log('🌀 Gelombang menggunakan cubic-bezier yang smooth');
        })();
    </script>

</body>
